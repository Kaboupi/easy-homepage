services:

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: ${GRAFANA_NAME:-grafana}
    ports:
      - ${GRAFANA_PORT:-3000}:3000
    volumes:
      - ../rendered/monitoring/grafana/dashboards:/etc/dashboards
      - ../rendered/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../rendered/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsSL http://127.0.0.1:3000 || exit 1"]
      interval: 1m
      timeout: 30s
      retries: 2
      start_period: 30s
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ${NODE_EXPORTER_NAME:-node-exporter}
    hostname: ${NODE_EXPORTER_HOSTNAME:-node-exporter}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: ${PROMETHEUS_NAME:-prometheus}
    hostname: ${PROMETHEUS_HOSTNAME:-prometheus}
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
      - ../rendered/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

volumes:
  prometheus:

